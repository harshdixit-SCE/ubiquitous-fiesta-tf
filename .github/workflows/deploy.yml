name: Terraform Deploy

on:
  # Manual trigger only — automatic triggers disabled until prod is ready
  workflow_dispatch:
    inputs:
      environment:
        description: "Environment to deploy (dev / prod)"
        required: true
        default: "dev"
        type: choice
        options:
          - dev
          - prod
      action:
        description: "Action to perform"
        required: true
        default: "plan"
        type: choice
        options:
          - plan
          - plan-and-apply

jobs:
  terraform:
    name: Terraform ${{ inputs.action }}
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}

    permissions:
      id-token: write
      contents: read
      pull-requests: write

    defaults:
      run:
        working-directory: infra

    env:
      TF_ENV: ${{ inputs.environment }}

    steps:
      # ── Setup ────────────────────────────────────────────────────────────────

      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~> 1.10"

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ap-south-1

      # ── Init & Validate ───────────────────────────────────────────────────────

      - name: Terraform Init
        run: |
          terraform init \
            -backend-config="$GITHUB_WORKSPACE/environments/${{ env.TF_ENV }}/backend.hcl"

      - name: Terraform Validate
        run: terraform validate

      # ── Plan ─────────────────────────────────────────────────────────────────

      - name: Terraform Plan
        id: plan
        run: |
          terraform plan \
            -var-file="$GITHUB_WORKSPACE/environments/${{ env.TF_ENV }}/${{ env.TF_ENV }}.tfvars" \
            -out=tfplan \
            -no-color > plan_output.txt 2>&1
          cat plan_output.txt

      # Upload plan as artifact — reused by apply step and available for review
      - name: Upload Plan Artifact
        uses: actions/upload-artifact@v4
        with:
          name: tfplan-${{ env.TF_ENV }}-${{ github.run_id }}
          path: infra/tfplan
          retention-days: 5

      # ── Apply ─────────────────────────────────────────────────────────────────
      # Only runs when manually selecting plan-and-apply

      - name: Terraform Apply
        if: inputs.action == 'plan-and-apply'
        run: terraform apply -auto-approve tfplan
