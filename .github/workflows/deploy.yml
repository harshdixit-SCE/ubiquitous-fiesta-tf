name: Terraform Deploy

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Environment to deploy (dev / prod)"
        required: true
        default: "dev"
        type: choice
        options:
          - dev
          - prod
      namespace:
        description: "Your personal namespace (e.g. harsh) — must be unique per engineer"
        required: true
        type: string

jobs:
  deploy:
    name: Terraform Apply
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    permissions:
      id-token: write
      contents: read

    defaults:
      run:
        working-directory: infra

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~> 1.0"

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ap-south-1

      - name: Terraform Init
        run: |
          terraform init \
            -backend-config="../environments/${{ inputs.environment }}/backend.hcl"

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Plan
        run: |
          terraform plan \
            -var-file="../environments/${{ inputs.environment }}/${{ inputs.environment }}.tfvars" \
            -var="namespace=${{ inputs.namespace }}" \
            -out=tfplan

      - name: Terraform Apply
        run: terraform apply -auto-approve tfplan
