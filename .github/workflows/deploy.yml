name: Terraform Deploy

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Environment to deploy (dev / prod)"
        required: true
        default: "dev"
        type: choice
        options:
          - dev
          - prod
      namespace:
        description: "Your personal namespace (e.g. harsh) — must be unique per engineer"
        required: true
        type: string

jobs:
  deploy:
    name: Terraform Apply
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}

    defaults:
      run:
        working-directory: infra

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~> 1.0"

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Push DB credentials to AWS Secrets Manager
        run: |
          SECRET_NAME="${{ inputs.namespace }}/${{ inputs.environment }}/db/credentials"
          SECRET_VALUE=$(jq -n \
            --arg u "${{ secrets.DB_USERNAME }}" \
            --arg p "${{ secrets.DB_PASSWORD }}" \
            '{"username": $u, "password": $p}')

          # Create secret if it doesn't exist, otherwise update it
          if aws secretsmanager describe-secret --secret-id "$SECRET_NAME" > /dev/null 2>&1; then
            aws secretsmanager put-secret-value \
              --secret-id "$SECRET_NAME" \
              --secret-string "$SECRET_VALUE"
            echo "Updated existing secret: $SECRET_NAME"
          else
            aws secretsmanager create-secret \
              --name "$SECRET_NAME" \
              --description "DB credentials for ${{ inputs.namespace }} ${{ inputs.environment }}" \
              --secret-string "$SECRET_VALUE"
            echo "Created new secret: $SECRET_NAME"
          fi

      - name: Terraform Init
        run: |
          terraform init \
            -backend-config="../environments/${{ inputs.environment }}/backend.hcl"

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Plan
        run: |
          terraform plan \
            -var-file="../environments/${{ inputs.environment }}/${{ inputs.environment }}.tfvars" \
            -var="namespace=${{ inputs.namespace }}" \
            -out=tfplan

      - name: Terraform Apply
        run: terraform apply -auto-approve tfplan
