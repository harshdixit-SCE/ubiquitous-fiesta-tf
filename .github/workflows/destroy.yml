name: Terraform Destroy

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Environment to destroy (dev / prod)"
        required: true
        default: "dev"
        type: choice
        options:
          - dev
          - prod
      namespace:
        description: "Your personal namespace (e.g. harsh) — must match the one used during deploy"
        required: true
        type: string
      confirm:
        description: "Type DESTROY to confirm — this will delete all resources"
        required: true
        type: string

jobs:
  destroy:
    name: Terraform Destroy
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    permissions:
      id-token: write
      contents: read

    defaults:
      run:
        working-directory: infra

    steps:
      - name: Validate confirmation
        if: inputs.confirm != 'DESTROY'
        run: |
          echo "Confirmation failed. You must type DESTROY to proceed."
          exit 1

      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~> 1.0"

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ap-south-1

      - name: Terraform Init
        run: |
          terraform init \
            -backend-config="../environments/${{ inputs.environment }}/backend.hcl"

      - name: Terraform Destroy
        run: |
          terraform destroy \
            -var-file="../environments/${{ inputs.environment }}/${{ inputs.environment }}.tfvars" \
            -var="namespace=${{ inputs.namespace }}" \
            -auto-approve
