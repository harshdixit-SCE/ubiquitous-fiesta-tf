name: Terraform Destroy

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Environment to destroy (dev / prod)"
        required: true
        default: "dev"
        type: choice
        options:
          - dev
          - prod
      action:
        description: "Action to perform"
        required: true
        default: "plan"
        type: choice
        options:
          - plan
          - plan-and-destroy
      confirm:
        description: "Type DESTROY to confirm — only required for plan-and-destroy"
        required: false
        type: string

jobs:
  destroy:
    name: Terraform Destroy
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    permissions:
      id-token: write
      contents: read

    defaults:
      run:
        working-directory: infra

    steps:
      - name: Validate confirmation
        if: inputs.action == 'plan-and-destroy' && inputs.confirm != 'DESTROY'
        run: |
          echo "Confirmation failed. You must type DESTROY to proceed with plan-and-destroy."
          exit 1

      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~> 1.10"

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ap-south-1

      - name: Terraform Init
        run: |
          terraform init \
            -backend-config="$GITHUB_WORKSPACE/environments/${{ inputs.environment }}/backend.hcl"

      - name: Terraform Plan Destroy
        run: |
          terraform plan -destroy \
            -var-file="$GITHUB_WORKSPACE/environments/${{ inputs.environment }}/${{ inputs.environment }}.tfvars" \
            -out=tfdestroyplan

      - name: Terraform Destroy
        if: inputs.action == 'plan-and-destroy'
        run: terraform apply -auto-approve tfdestroyplan
